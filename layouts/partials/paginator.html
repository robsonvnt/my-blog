{{ $pag := $.Paginator }}
{{ if gt $pag.TotalPages 1 }}
<ul class="pagination">
  <li class="page-prev">
    {{ if $pag.HasPrev }}
    <a href="{{ $pag.Prev.URL }}" aria-label="Anterior">← Anterior</a>
    {{ end }}
  </li>
  <li class="page-next">
    {{ if $pag.HasNext }}
    <a href="{{ $pag.Next.URL }}" aria-label="Próximo">Próximo →</a>
    {{ end }}
  </li>
</ul>
{{ end }}
