{{ define "main" }}
<div class="page-area">
  <h1 class="page-heading">Tags</h1>
  <ul class="tag-list">
    {{ range .Data.Terms.ByCount }}
    <li>
      <a class="tag-row" href="{{ .Page.RelPermalink }}">
        <span class="tag-row-name">{{ .Page.Title }}</span>
        <span class="tag-row-count">{{ .Count }} {{ if eq .Count 1 }}post{{ else }}posts{{ end }}</span>
      </a>
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
