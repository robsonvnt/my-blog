{{ define "main" }}
<div class="about-area">
  <div class="about-avatar">
    {{- if .Site.Params.profileImage -}}
      <img src="{{ .Site.Params.profileImage | relURL }}" alt="{{ .Site.Params.fullName | default .Site.Title }}">
    {{- else -}}
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    {{- end -}}
  </div>
  <h1 class="about-name">{{ .Site.Params.fullName | default .Site.Title }}</h1>
  <p class="about-handle">{{ .Site.Params.handle | default "robsonvnt" }}</p>
  <div class="about-bio">
    {{ .Content }}
  </div>
  {{ with .Site.Params.contacts }}
  <hr class="about-divider">
  <div class="contact-links">
    {{ range . }}
      <a class="contact-link" href="{{ .url }}"{{ if hasPrefix .url "http" }} target="_blank" rel="noopener noreferrer"{{ end }}>{{ .name }} ↗</a>
    {{ end }}
  </div>
  {{ end }}
</div>
{{ end }}
