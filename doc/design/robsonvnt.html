  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; }
    button { font-family: inherit; cursor: pointer; }

    /* ── Tokens ── */
    :root {
      --font-display: 'Newsreader', Georgia, serif;
      --font-read:    'Source Serif 4', Georgia, serif;
      --font-ui:      'Inter', system-ui, sans-serif;
      --ease-soft: cubic-bezier(0.32, 0.72, 0.32, 1);
      --t-fast: 120ms;
      --t-base: 200ms;
    }

    :root, [data-theme="paper"] {
      --bg:          #f4f4f1;
      --surface:     #fbfbf8;
      --surface-2:   #ebebe5;
      --rule:        #dcdcd5;
      --rule-soft:   #e5e5de;
      --ink:         #2a2a26;
      --ink-2:       #555550;
      --ink-3:       #8a8a82;
      --ink-4:       #b8b8b0;
      --accent:      #6a7a5c;
      --accent-deep: #4a5a3e;
      --accent-soft: #c8d2bc;
      --ink-blue:    #4a5d75;
      color-scheme: light;
    }

    [data-theme="ink"] {
      --bg:          #181614;
      --surface:     #201d1a;
      --surface-2:   #2a2520;
      --rule:        #363028;
      --rule-soft:   #2d2820;
      --ink:         #ede3d2;
      --ink-2:       #c5b89e;
      --ink-3:       #90816c;
      --ink-4:       #655848;
      --accent:      #c4855a;
      --accent-deep: #e0a070;
      --accent-soft: #5c3820;
      --ink-blue:    #8a9db4;
      color-scheme: dark;
    }

    /* ── Base ── */
    html { background: var(--bg); scroll-behavior: auto; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-ui);
      font-size: 15px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Shell ── */
    .app {
      max-width: 880px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--rule);
      border-right: 1px solid var(--rule);
    }

    /* ── Header ── */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--surface);
      border-bottom: 1px solid var(--rule);
    }

    .wordmark {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      font-style: italic;
      color: var(--ink);
      letter-spacing: -0.025em;
      line-height: 1;
      font-variation-settings: "opsz" 22;
      background: none;
      border: none;
      padding: 0;
    }
    .wordmark:hover { color: var(--ink); }
    .wdot { color: var(--accent); font-style: normal; }

    .site-nav { display: flex; align-items: center; gap: 1px; }

    .nav-link {
      font-size: 13px;
      color: var(--ink-3);
      background: none;
      border: none;
      padding: 5px 9px;
      border-radius: 6px;
      position: relative;
      transition: color var(--t-fast);
    }
    .nav-link:hover { color: var(--ink); }
    .nav-link.is-active { color: var(--ink); }
    .nav-link.is-active::after {
      content: '';
      position: absolute;
      bottom: 1px;
      left: 9px;
      right: 9px;
      height: 1px;
      background: var(--accent);
    }

    .theme-btn {
      background: none;
      border: none;
      color: var(--ink-3);
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      margin-left: 8px;
      transition: background var(--t-fast), color var(--t-fast);
    }
    .theme-btn:hover { background: var(--surface-2); color: var(--ink); }
    .theme-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Bio band ── */
    .bio-band {
      padding: 28px 32px 26px;
      border-bottom: 1px solid var(--rule);
    }
    .bio-tagline {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 17px;
      font-weight: 400;
      color: var(--ink-2);
      line-height: 1.55;
      margin: 0;
      font-variation-settings: "opsz" 18;
      max-width: 500px;
    }

    /* ── Post list ── */
    .post-list { list-style: none; margin: 0; padding: 0; }

    .post-item {
      padding: 28px 32px 26px;
      border-bottom: 1px solid var(--rule);
      animation: fadeUp 0.2s var(--ease-soft) both;
    }

    .post-meta-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 9px;
    }
    .post-date {
      font-size: 11px;
      color: var(--ink-3);
      letter-spacing: 0.025em;
    }
    .meta-sep { color: var(--rule); user-select: none; font-size: 11px; }
    .tag-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--accent);
      background: none;
      border: none;
      padding: 0;
      font-family: var(--font-ui);
      transition: color var(--t-fast);
    }
    .tag-eyebrow:hover { color: var(--accent-deep); }

    .post-title {
      font-family: var(--font-display);
      font-size: 25px;
      font-weight: 500;
      line-height: 1.25;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin: 0 0 10px;
      background: none;
      border: none;
      padding: 0;
      text-align: left;
      display: block;
      width: 100%;
      font-variation-settings: "opsz" 26;
      text-wrap: balance;
      transition: color var(--t-fast);
    }
    .post-title:hover { color: var(--accent-deep); }

    .post-excerpt {
      font-size: 14px;
      line-height: 1.65;
      color: var(--ink-2);
      margin: 0 0 14px;
      max-width: 660px;
      text-wrap: pretty;
    }

    .read-more {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--ink-3);
      background: none;
      border: none;
      padding: 0;
      font-family: var(--font-ui);
      transition: color var(--t-fast);
    }
    .read-more:hover { color: var(--accent); }
    .rm-arr { display: inline-block; transition: transform var(--t-fast); }
    .read-more:hover .rm-arr { transform: translateX(3px); }

    /* ── Reading progress ── */
    .reading-progress {
      position: sticky;
      top: 53px;
      height: 2px;
      z-index: 15;
      background: transparent;
    }
    .reading-progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.08s linear;
    }

    /* ── Article ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--ink-3);
      background: none;
      border: none;
      border-bottom: 1px solid var(--rule);
      padding: 13px 32px;
      width: 100%;
      text-align: left;
      font-family: var(--font-ui);
      transition: color var(--t-fast);
    }
    .back-link:hover { color: var(--ink); }
    .back-link svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .article-header-area {
      padding: 34px 32px 28px;
      border-bottom: 1px solid var(--rule);
      animation: fadeUp 0.2s var(--ease-soft);
    }
    .article-eyebrow {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .article-title {
      font-family: var(--font-display);
      font-size: 34px;
      font-weight: 500;
      line-height: 1.2;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin: 0 0 16px;
      text-wrap: balance;
      font-variation-settings: "opsz" 36;
    }
    .article-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--ink-3);
    }

    .article-body {
      max-width: 640px;
      margin: 0 auto;
      padding: 38px 32px 80px;
      font-family: var(--font-read);
      font-size: 17px;
      line-height: 1.78;
      color: var(--ink);
      font-variation-settings: "opsz" 16;
      animation: fadeUp 0.2s var(--ease-soft);
    }
    .article-body p { margin: 0 0 1.2em; text-wrap: pretty; }
    .article-body h2 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
      margin: 1.8em 0 0.5em;
      font-variation-settings: "opsz" 24;
    }
    .article-body blockquote {
      margin: 1.4em 0;
      padding: 0.2em 0 0.2em 1.2em;
      border-left: 2px solid var(--accent-soft);
      color: var(--ink-2);
      font-style: italic;
    }
    .article-body a { color: var(--ink-blue); text-decoration-thickness: 1px; text-underline-offset: 3px; }

    .original-link-bar {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 32px 48px;
      border-top: 1px solid var(--rule-soft);
    }
    .original-link {
      font-size: 13px;
      color: var(--ink-3);
      text-decoration: none;
      font-family: var(--font-ui);
      transition: color var(--t-fast);
      display: inline-block;
      padding-top: 16px;
    }
    .original-link:hover { color: var(--accent); }

    /* ── Tags page ── */
    .page-area {
      padding: 32px;
      animation: fadeUp 0.2s var(--ease-soft);
    }
    .page-heading {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 500;
      color: var(--ink);
      margin: 0 0 24px;
      letter-spacing: -0.02em;
      font-variation-settings: "opsz" 28;
    }
    .tag-list { list-style: none; margin: 0; padding: 0; }
    .tag-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 13px 0;
      border-bottom: 1px solid var(--rule);
      width: 100%;
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
      text-align: left;
      color: var(--ink);
      transition: color var(--t-fast);
    }
    .tag-row:hover { color: var(--accent); }
    .tag-row-name {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 400;
      font-variation-settings: "opsz" 20;
    }
    .tag-row-count {
      font-size: 12px;
      color: var(--ink-3);
      font-family: var(--font-ui);
    }

    /* ── About page ── */
    .about-area {
      padding: 40px 32px 80px;
      max-width: 560px;
      animation: fadeUp 0.2s var(--ease-soft);
    }
    .about-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
    }
    .about-avatar svg { width: 32px; height: 32px; stroke: var(--ink-3); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .about-name {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 500;
      color: var(--ink);
      margin: 0 0 4px;
      letter-spacing: -0.02em;
      font-variation-settings: "opsz" 28;
    }
    .about-handle {
      font-size: 13px;
      color: var(--ink-3);
      font-family: var(--font-ui);
      margin: 0 0 24px;
    }
    .about-bio {
      font-family: var(--font-read);
      font-size: 16px;
      line-height: 1.75;
      color: var(--ink-2);
      font-variation-settings: "opsz" 14;
    }
    .about-bio p { margin: 0 0 1em; text-wrap: pretty; }
    .about-divider { border: none; border-top: 1px solid var(--rule); margin: 24px 0; }
    .contact-links { display: flex; gap: 10px; flex-wrap: wrap; }
    .contact-link {
      font-size: 13px;
      color: var(--ink-3);
      text-decoration: none;
      padding: 7px 13px;
      border: 1px solid var(--rule);
      border-radius: 8px;
      font-family: var(--font-ui);
      transition: border-color var(--t-fast), color var(--t-fast);
    }
    .contact-link:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Series / Crônicas ── */
    .series-indicator {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 13px;
      color: var(--accent);
      background: none;
      border: none;
      padding: 0;
      margin-bottom: 7px;
      display: block;
      text-align: left;
      font-variation-settings: "opsz" 14;
      transition: color var(--t-fast);
    }
    .series-indicator:hover { color: var(--accent-deep); }

    .series-masthead {
      padding: 36px 32px 30px;
      border-bottom: 1px solid var(--rule);
      animation: fadeUp 0.2s var(--ease-soft);
    }
    .series-kicker {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin: 0 0 14px;
    }
    .series-heading {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 500;
      color: var(--ink);
      margin: 0 0 13px;
      letter-spacing: -0.02em;
      line-height: 1.2;
      font-variation-settings: "opsz" 34;
      text-wrap: balance;
    }
    .series-description {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 16px;
      color: var(--ink-2);
      line-height: 1.55;
      margin: 0 0 14px;
      max-width: 480px;
      font-variation-settings: "opsz" 16;
    }
    .series-post-count {
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--ink-3);
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .site-header { padding: 13px 20px; }
      .bio-band, .post-item, .page-area, .article-header-area, .series-masthead { padding-left: 20px; padding-right: 20px; }
      .about-area { padding-left: 20px; padding-right: 20px; }
      .back-link { padding-left: 20px; padding-right: 20px; }
      .article-body, .original-link-bar { padding-left: 20px; padding-right: 20px; }
      .post-title { font-size: 21px; }
      .article-title { font-size: 26px; }
      .nav-link { padding: 5px 6px; font-size: 12px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .post-item, .page-area, .about-area, .article-header-area, .article-body { animation: none; }
    }
  </style>
</head>

/* ── Article ── */
function ReadingProgress() {
  const [pct, setPct] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const d = document.documentElement;
      const top = d.scrollTop || document.body.scrollTop;
      const h   = d.scrollHeight - d.clientHeight;
      setPct(h > 0 ? (top / h) * 100 : 0);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <div className="reading-progress">
      <div className="reading-progress-fill" style={{width: `${pct}%`}} />
    </div>
  );
}

function ArticlePage({ post, go }) {
  if (!post) return null;
  return (
    <>
      <ReadingProgress />
      <button className="back-link" onClick={() => go(post.series ? 'cronicas' : 'home')}>
        <IcoChevLeft /> {post.series ? post.series : 'Todos os posts'}
      </button>
      <div className="article-header-area">
        {post.series && (
          <button className="series-indicator" style={{marginBottom: '12px'}} onClick={() => go('cronicas')}>{post.series}</button>
        )}

      </div>
      <article className="article-body">

      <div className="original-link-bar">

      </div>
    </>
  );
}

/* ── App ── */
function App() {
  const [page, setPage]   = useState('home');
  const [post, setPost]   = useState(null);
  const [theme, setTheme] = useState(() => localStorage.getItem('rvnt-theme') || 'paper');

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('rvnt-theme', theme);
  }, [theme]);

  const go = (pg, p = null) => {
    setPage(pg);
    setPost(p);
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
  };

  return (
    <div className="app">
      <SiteHeader theme={theme} setTheme={setTheme} page={page} go={go} />
      <main key={page + (post?.id || '')}>
        {page === 'home'    && <HomePage    go={go} />}
        {page === 'article' && <ArticlePage post={post} go={go} />}
        {page === 'cronicas' && <CronicasPage go={go} />}
        {page === 'tags'    && <TagsPage    go={go} />}
        {page === 'about'   && <AboutPage />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
